# ML/AI Landscape source configuration.
#
# stream:  ml        — Machine learning research, papers, models, techniques
#          ai        — Broader AI: industry, policy, ethics, products, companies
#          both      — General tech/AI sources; articles are classified
#                      per-item by keyword matching in the pipeline
#
# credibility: 0.0–1.0  (used in scoring)
# type:        rss | http | api

sources:

  # ── ML Research ────────────────────────────────────────────────────────────

  - name: ArXiv cs.LG (Machine Learning)
    url: https://rss.arxiv.org/rss/cs.LG
    type: rss
    credibility: 0.95
    enabled: true
    stream: ml
    tags: [research, papers, machine-learning]
    rationale: >-
      Cornell University's open-access preprint server for Machine Learning
      (cs.LG). The primary venue where ML researchers deposit papers before
      and alongside journal/conference publication. Peer review is not
      guaranteed pre-print, but the volume and research quality are
      unmatched anywhere; the field treats new arXiv submissions as the
      authoritative source of record for emerging work.

  - name: ArXiv cs.CL (Computation & Language)
    url: https://rss.arxiv.org/rss/cs.CL
    type: rss
    credibility: 0.95
    enabled: true
    stream: ml
    tags: [research, papers, nlp, language-models]
    rationale: >-
      ArXiv's Computation and Language category — the canonical feed for
      large language model research, NLP breakthroughs, tokenisation,
      alignment techniques, and language-model evaluation papers.
      Virtually every major LLM paper (GPT, BERT, LLaMA, Mistral families)
      was first disclosed here.

  - name: ArXiv cs.CV (Computer Vision)
    url: https://rss.arxiv.org/rss/cs.CV
    type: rss
    credibility: 0.93
    enabled: true
    stream: ml
    tags: [research, papers, computer-vision, generative-ai]
    rationale: >-
      ArXiv Computer Vision category. Key source for diffusion model
      research, image/video generation, object detection, and multimodal
      architectures. Stable Diffusion, DALL·E, Sora-class work originates
      in this feed.

  - name: ArXiv cs.AI (Artificial Intelligence)
    url: https://rss.arxiv.org/rss/cs.AI
    type: rss
    credibility: 0.93
    enabled: true
    stream: ml
    tags: [research, papers, ai, reasoning]
    rationale: >-
      ArXiv's broader Artificial Intelligence category. Covers planning,
      reasoning, knowledge representation, multi-agent systems, and
      AI safety theory. Complements cs.LG and cs.CL with more classical
      AI and symbolic/neuro-symbolic research.

  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    type: rss
    credibility: 0.88
    enabled: true
    stream: ml
    tags: [research, models, open-source, ml-ops]
    rationale: >-
      Hugging Face operates the largest open-source ML model hub and is a
      primary venue for applied ML announcements: new model releases,
      training tutorials, fine-tuning guides, and dataset publications.
      Content bridges cutting-edge research and practical implementation,
      with consistently high technical quality.

  - name: Google DeepMind Blog
    url: https://deepmind.google/blog/rss.xml
    type: rss
    credibility: 0.92
    enabled: true
    stream: ml
    tags: [research, deepmind, google, reinforcement-learning]
    rationale: >-
      Google DeepMind is among the most prolific and influential AI
      research organisations globally, responsible for AlphaFold,
      AlphaGo, Gemini, and numerous foundational RL and ML advances.
      Blog posts typically accompany peer-reviewed publications and
      carry very high research credibility.

  - name: Google Research Blog
    url: https://blog.research.google/feeds/posts/default
    type: rss
    credibility: 0.91
    enabled: true
    stream: ml
    tags: [research, google, ml, systems]
    rationale: >-
      Google Research publishes findings across ML, systems, and applied
      AI. Posts accompany papers at top venues (NeurIPS, ICML, ICLR,
      ACL) and cover a broad range of topics from fundamental learning
      theory to large-scale infrastructure. Very high publication quality.

  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    type: rss
    credibility: 0.90
    enabled: true
    stream: ml
    tags: [research, openai, gpt, safety]
    rationale: >-
      OpenAI's official blog is the primary channel for announcements
      of new models (GPT series, o1, DALL·E, Whisper, Sora) and
      safety research. Posts range from technical research summaries
      to product announcements; the research posts carry high credibility
      given OpenAI's position at the frontier of the field.

  - name: Microsoft Research Blog
    url: https://www.microsoft.com/en-us/research/blog/feed/
    type: rss
    credibility: 0.88
    enabled: true
    stream: ml
    tags: [research, microsoft, ml, systems]
    rationale: >-
      Microsoft Research is one of the world's largest industrial research
      labs, producing significant work in language models (PHI series),
      reinforcement learning, and responsible AI. Strong output across
      systems ML, NLP, and ML theory; high publication standards.

  - name: Papers With Code
    url: https://paperswithcode.com/feeds/papers/
    type: rss
    credibility: 0.87
    enabled: false  # Feed returns malformed XML (syntax error); disabled until fixed
    stream: ml
    tags: [research, papers, benchmarks, open-source]
    rationale: >-
      Aggregates ML papers that include open-source code implementations.
      Strong signal for reproducible research and new state-of-the-art
      results on standard benchmarks. Particularly valuable for tracking
      which papers are gaining traction and have practical implementations.

  - name: The Gradient
    url: https://thegradient.pub/rss/
    type: rss
    credibility: 0.84
    enabled: true
    stream: ml
    tags: [research, analysis, perspectives]
    rationale: >-
      Independent publication run by researchers and practitioners.
      Publishes long-form analysis, perspectives, and accessible
      explainers of ML research. Content is technically rigorous and
      written by domain experts; useful for understanding the significance
      and context of major research trends.

  - name: PyTorch Blog
    url: https://pytorch.org/blog/feed.xml
    type: rss
    credibility: 0.87
    enabled: true
    stream: ml
    tags: [research, ml-ops, framework, open-source]
    rationale: >-
      Official blog of PyTorch, the dominant open-source ML framework used
      across academia and industry. Posts cover new releases, performance
      improvements, and best practices. Highly credible for framework-level
      ML developments, ecosystem tooling, and distributed training advances.

  - name: DeepLearning.AI Blog
    url: https://www.deeplearning.ai/blog/feed/
    type: rss
    credibility: 0.84
    enabled: false  # Feed returns malformed XML (invalid token); disabled until fixed
    stream: ml
    tags: [research, education, practical-ml, andrew-ng]
    rationale: >-
      Andrew Ng's AI education and research organisation. Publishes accessible
      but technically accurate analysis of ML advances, tutorials, and
      commentary on the field. The AI Newsletter and research summaries reach
      a large professional audience; strong for contextualising new research
      within the broader ML landscape.

  - name: AI Alignment Forum
    url: https://www.alignmentforum.org/feed.xml
    type: rss
    credibility: 0.83
    enabled: true
    stream: ml
    tags: [safety, alignment, research, technical]
    rationale: >-
      The primary venue for technical AI safety and alignment research
      discussion. Content ranges from formal theoretical work to applied
      interpretability and robustness research. Highly credible within
      the safety community; essential for tracking ML safety developments
      before they appear in mainstream publications.

  - name: TensorFlow Blog
    url: https://blog.tensorflow.org/feeds/posts/default
    type: rss
    credibility: 0.86
    enabled: true
    stream: ml
    tags: [research, google, framework, ml-ops]
    rationale: >-
      Google's TensorFlow team blog. Covers framework updates, production
      ML deployment patterns, and applied research using TensorFlow/Keras.
      Strong for ML infrastructure, model optimisation, and on-device
      inference developments. Backed by Google's engineering and research
      teams with high publication quality.

  - name: ArXiv stat.ML (Statistics & Machine Learning)
    url: https://rss.arxiv.org/rss/stat.ML
    type: rss
    credibility: 0.93
    enabled: true
    stream: ml
    tags: [research, papers, statistics, probabilistic-ml]
    rationale: >-
      ArXiv's Statistics and Machine Learning category. Captures probabilistic
      ML, Bayesian deep learning, uncertainty quantification, and theoretical
      ML research that spans the statistics and computer science communities.
      Many foundational works on variational inference, normalising flows, and
      diffusion theory appear here alongside or before cs.LG.

  - name: ArXiv cs.RO (Robotics)
    url: https://rss.arxiv.org/rss/cs.RO
    type: rss
    credibility: 0.91
    enabled: true
    stream: ml
    tags: [research, papers, robotics, embodied-ai]
    rationale: >-
      ArXiv's Robotics category. Critical for tracking embodied AI — robot
      learning, manipulation, sim-to-real transfer, and autonomous systems.
      Increasingly overlaps with foundation-model research as large models
      are applied to physical robotic control and planning.

  - name: ArXiv cs.NE (Neural and Evolutionary Computing)
    url: https://rss.arxiv.org/rss/cs.NE
    type: rss
    credibility: 0.91
    enabled: true
    stream: ml
    tags: [research, papers, neural-computing, evolutionary-algorithms]
    rationale: >-
      ArXiv's Neural and Evolutionary Computing category. Covers neuromorphic
      computing, spiking neural networks, evolutionary ML, and neuroevolution.
      Captures hardware-inspired and bio-inspired ML approaches that
      complement the mainstream gradient-descent literature.

  - name: NVIDIA Developer Blog
    url: https://developer.nvidia.com/blog/feed/
    type: rss
    credibility: 0.87
    enabled: true
    stream: ml
    tags: [research, gpu, cuda, ml-infrastructure, hardware]
    rationale: >-
      NVIDIA's technical blog for developers. As the dominant supplier of AI
      training and inference hardware, NVIDIA publishes authoritative content
      on GPU architectures, CUDA optimisation, TensorRT, and large-scale
      distributed training. Essential for tracking the compute layer that
      underpins frontier model development.

  - name: BAIR Blog (Berkeley AI Research)
    url: https://bair.berkeley.edu/blog/feed.xml
    type: rss
    credibility: 0.90
    enabled: true
    stream: ml
    tags: [research, academia, berkeley, reinforcement-learning]
    rationale: >-
      Official blog of Berkeley Artificial Intelligence Research. UC Berkeley
      is among the most prolific AI research universities globally, producing
      seminal work in reinforcement learning (PPO, SAC), robot learning, NLP,
      and computer vision. Posts are written by PhD students and faculty
      directly summarising their peer-reviewed research.

  - name: Lilian Weng's Blog
    url: https://lilianweng.github.io/index.xml
    type: rss
    credibility: 0.91
    enabled: true
    stream: ml
    tags: [research, analysis, deep-learning, alignment]
    rationale: >-
      Lilian Weng is a former head of safety at OpenAI. Her blog publishes
      exceptionally thorough and widely cited deep-dives on core ML topics:
      attention mechanisms, policy gradients, diffusion models, LLM agents,
      and AI safety. Posts are technically rigorous, well-sourced, and serve
      as reference material throughout the ML research community.

  - name: Sebastian Raschka's Magazine
    url: https://magazine.sebastianraschka.com/feed
    type: rss
    credibility: 0.87
    enabled: true
    stream: ml
    tags: [research, analysis, llms, papers-explained]
    rationale: >-
      Sebastian Raschka is a machine learning researcher and author known for
      his accessible but technically precise breakdowns of ML papers and LLM
      developments. Publishes regular research roundups and in-depth explainers
      that are widely read in the practitioner community. Strong signal for
      which recent papers are gaining traction.

  - name: Nature Machine Intelligence
    url: https://www.nature.com/natmachintell.rss
    type: rss
    credibility: 0.94
    enabled: true
    stream: ml
    tags: [research, peer-reviewed, nature, high-impact]
    rationale: >-
      Nature Machine Intelligence is one of the highest-impact peer-reviewed
      journals covering AI and ML. Unlike arXiv, all content has passed
      rigorous peer review. Publishes breakthrough research, perspective
      articles, and commentary from leading researchers. The journal's
      editorial standards and impact factor make it a uniquely high-credibility
      source for validated ML results.

  - name: fast.ai Blog
    url: https://www.fast.ai/posts/index.xml
    type: rss
    credibility: 0.83
    enabled: false  # Feed returns malformed XML (undefined entity); disabled until fixed
    stream: ml
    tags: [research, education, practical-ml]
    rationale: >-
      Jeremy Howard and Rachel Thomas's practical deep learning blog.
      Known for surfacing important research in accessible form and for
      original contributions (ULMFiT, fastai library). Lower publication
      volume than major labs but consistently influential posts.

  - name: Anthropic Research
    url: https://www.anthropic.com/rss.xml
    type: rss
    credibility: 0.90
    enabled: true
    stream: ml
    tags: [research, safety, alignment, llm]
    rationale: >-
      Anthropic is a leading AI safety company and developer of the Claude
      model family. Research posts cover Constitutional AI, interpretability,
      scaling, and alignment theory. High credibility for safety-focused
      ML research.

  - name: Meta AI Blog
    url: https://ai.meta.com/blog/rss/
    type: rss
    credibility: 0.88
    enabled: true
    stream: ml
    tags: [research, meta, open-source, llama]
    rationale: >-
      Meta AI Research (FAIR) is responsible for LLaMA, PyTorch, Segment
      Anything, and numerous foundational vision and NLP advances.
      Open-source focus makes Meta a particularly important source for
      the practitioner ML community.

  - name: Apple Machine Learning Research
    url: https://machinelearning.apple.com/rss.xml
    type: rss
    credibility: 0.88
    enabled: true
    stream: ml
    tags: [research, apple, on-device-ml, privacy]
    rationale: >-
      Apple's ML research blog covers on-device machine learning, privacy-
      preserving techniques, and production-scale ML systems deployed across
      iOS, macOS, and Apple Silicon. Particularly relevant for federated learning,
      differential privacy, and efficient inference research. Posts are technically
      rigorous and represent work running at billion-device scale.

  - name: Amazon Science Blog
    url: https://www.amazon.science/index.rss
    type: rss
    credibility: 0.87
    enabled: true
    stream: ml
    tags: [research, amazon, aws, systems-ml]
    rationale: >-
      Amazon's research publication covering Alexa, AWS AI services, robotics,
      and supply chain ML. Strong on reinforcement learning, conversational AI,
      and large-scale systems research. Represents one of the largest ML
      engineering organisations in the world; research reflects production
      constraints at massive scale.

  - name: EleutherAI Blog
    url: https://blog.eleuther.ai/index.xml
    type: rss
    credibility: 0.86
    enabled: true
    stream: ml
    tags: [research, open-source, llm, interpretability]
    rationale: >-
      EleutherAI is a non-profit open-source AI research collective responsible
      for the GPT-Neo/J/NeoX series, the Pile dataset, and the LM Evaluation
      Harness. Strong track record in reproducible open-source alternatives to
      closed frontier models; blog covers interpretability, alignment, and
      language model evaluation research.

  - name: xAI Blog
    url: https://x.ai/blog/rss.xml
    type: rss
    credibility: 0.84
    enabled: true
    stream: ml
    tags: [research, xai, grok, llm]
    rationale: >-
      Elon Musk's AI company building the Grok model series. Publishes model
      releases and technical announcements. Credibility reflects frontier model
      status; lower than established labs due to shorter publication track record.

  - name: ArXiv cs.CR (Cryptography & Security)
    url: https://rss.arxiv.org/rss/cs.CR
    type: rss
    credibility: 0.90
    enabled: true
    stream: ml
    tags: [research, papers, ai-security, adversarial-ml]
    rationale: >-
      ArXiv's Cryptography and Security category increasingly publishes adversarial
      ML, prompt injection, model extraction, and AI safety research sitting at the
      intersection of security and machine learning. A key feed for tracking the
      security implications of AI systems.

  - name: ArXiv cs.IR (Information Retrieval)
    url: https://rss.arxiv.org/rss/cs.IR
    type: rss
    credibility: 0.88
    enabled: true
    stream: ml
    tags: [research, papers, rag, retrieval, search]
    rationale: >-
      ArXiv Information Retrieval category covers RAG (retrieval-augmented generation),
      dense retrieval, recommendation systems, and search. Highly relevant to the
      practical deployment of LLMs in production systems; most RAG architecture
      and vector search papers appear here first.

  - name: Epoch AI Blog
    url: https://epochai.org/blog/rss.xml
    type: rss
    credibility: 0.87
    enabled: true
    stream: ai
    tags: [analysis, ai-progress, compute, forecasting]
    rationale: >-
      Epoch AI tracks compute scaling trends, training costs, and AI progress
      metrics. Publishes rigorous quantitative analysis of the AI field's
      trajectory — an essential counterpart to hype-driven reporting. Widely
      cited in AI policy circles for evidence-based forecasting of AI
      capabilities development.

  - name: Machine Learning Mastery
    url: https://machinelearningmastery.com/feed/
    type: rss
    credibility: 0.78
    enabled: true
    stream: ml
    tags: [education, tutorials, applied-ml]
    rationale: >-
      Jason Brownlee's applied ML education site — one of the most widely read
      ML tutorial resources on the internet. Covers practical implementation of
      ML algorithms, deep learning frameworks, and applied NLP. Lower credibility
      weight reflects educational rather than research content; useful for tracking
      which applied techniques are gaining practitioner adoption.

  - name: The Algorithmic Bridge
    url: https://thealgorithmicbridge.substack.com/feed
    type: rss
    credibility: 0.80
    enabled: true
    stream: ai
    tags: [analysis, commentary, ai-society]
    rationale: >-
      Alberto Romero's Substack newsletter on AI's intersection with society,
      business, and culture. Thoughtful long-form analysis that contextualises
      AI developments beyond technical metrics. Useful for understanding how AI
      advances are perceived and debated outside research communities.

